<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Teachable Machine - Reconhecimento</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        #webcam-container { display: inline-block; margin: 10px; }
        #label-container { margin-top: 12px; text-align: left; display: inline-block; }
        #label-container div { margin: 4px 0; font-size: 16px; }
        #status { margin: 15px; font-size: 18px; font-weight: bold; }
        button { padding: 10px 20px; font-size: 18px; border: none; border-radius: 6px; cursor: pointer; }
        #muteButtton.green { background-color: green; color: white; }
        #muteButton.red { background-color: red; color: white; }
    </style>
    <!-- TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
    <!-- Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <h1>Reconhecimento com Teachable Machine</h1>
    <button onclick="init()">Iniciar Webcam</button>
    <div id="status"></div>

    <!-- Webcam -->
    <div id="webcam-container"></div>
    <!-- Labels -->
    <div id="label-container"></div>

    <!-- Status Button -->
     <div style="margin-top: 20px;">
        <button id="muteButton" class="green">Microfone não mutado</button>
     </div>

     <script>
        const URL = "https://teachablemachine.withgoogle.com/models/5HtSQCDyD/";

        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            try {
                document.getElementById("status").innerText = "Carregando modelo...";
                model = await tmImage.load(URL + "model.json", URL + "metadata.json");
                maxPredictions = model.getClassLabels().length;

                labelContainer = document.getElementById("label-container");
                labelContainer.innerHTML = "";
                for (let i = 0; i < maxPredictions; i++) {
                    const div = document.createElement("div");
                    div.id = "label-" + i;
                    div.innerText = "Classe " + i + ": --%";
                    labelContainer.appendChild(div);
                }
                const flip = true;
                webcam = new tmImage.Webcam(224, 224, flip);
                await webcam.setup();
                await webcam.play();
                document.getElementById("webcam-container").appendChild(webcam.canvas);

                window.requestAnimationFrame(loop);
                document.getElementById("status").innerText = "Modelo carregado e webcam iniciada.";
            }
            catch (err) {
                console.error("Erro ao iniciar", err);
                document.getElementById("status").innerText = "Erro. Veja console (F12).";
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);

            // Updates labels on screen
            for (let i = 0; i < prediction.length; i++) {
                const p = prediction[i];
                const el = document.getElementById("label-" + i);
                el.innerText = `${p.className}: ${(p.probability * 100).toFixed(2)}%`;
            }

            // Extra logic
            const muteButton = document.getElementById("muteButton");
            const withoutHeadset = prediction.find(p => p.className.toLowerCase() === "without headset");

            if (withoutHeadset && withoutHeadset.probability > 0.5) {
                muteButton.classList.remove("green");
                muteButton.classList.add("red");
                muteButton.innerText = "Microfone mutado";
            }
            else {
                muteButton.classList.remove("red");
                muteButton.classList.add("green");
                muteButton.innerText = "Microfone não mutado";
            }
        }
     </script>
</body>
</html>
